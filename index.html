<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>L'Abrì Ingresso</title>

<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #cam {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    display: block;
  }
</style>
</head>

<body>

<img src="webcam.jpg" id="cam">

<script>
setInterval(function() {
  document.getElementById("cam").src = "webcam.jpg?ts=" + Date.now();
}, 10000);
</script>

</body>
</html>
